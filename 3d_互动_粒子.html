<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 交互粒子手势系统</title>
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- 引入 MediaPipe 依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --bg-glass: rgba(15, 23, 42, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --accent-cyan: #00f0ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030712;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f3f4f6;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 欢迎遮罩层 */
        #welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 7, 18, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.4s ease;
        }

        .btn-start {
            background: linear-gradient(135deg, #00f0ff, #7000ff);
            border: none;
            padding: 16px 36px;
            font-size: 1.1rem;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
        }

        /* 控制面板 */
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 24px;
            width: 300px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h2 {
            margin: 0 0 16px 0;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        /* 3D 模板选择 */
        .model-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-model {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            color: #9ca3af;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .btn-model.active {
            background: rgba(0, 240, 255, 0.15);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        /* 调色板 */
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--border-glass);
            border-radius: 50%;
        }

        /* 状态指示 */
        .status-panel {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.85rem;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .status-row:last-child {
            margin-bottom: 0;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ef4444;
            margin-right: 6px;
        }

        .status-indicator.connected {
            background-color: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        /* 功能控制按钮 */
        .btn-action {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* 右下角手势检测小窗 */
        #preview-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-glass);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        #pip-canvas {
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            background-color: #111827;
            object-fit: cover;
        }

        #webcam {
            display: none;
        }
    </style>
</head>
<body>

    <div id="welcome-overlay">
        <h1 style="margin-bottom: 8px; font-weight: 500;">3D 交互粒子手势控制系统</h1>
        <p style="color: #9ca3af; margin-bottom: 30px; font-size: 0.95rem;">本实验需要获取摄像头权限用于分析手势运动轨迹</p>
        <button class="btn-start" id="btn-initialize">允许授权并开启系统</button>
    </div>

    <div id="canvas-container"></div>

    <div class="control-panel">
        <h2>3D 粒子控制面板</h2>
        
        <div class="form-group">
            <label>三维空间模板</label>
            <div class="model-selector">
                <button class="btn-model active" onclick="switchModel('heart')">爱心</button>
                <button class="btn-model" onclick="switchModel('flower')">花朵</button>
                <button class="btn-model" onclick="switchModel('taiji')">太极图</button>
                <button class="btn-model" onclick="switchModel('landscape')">山水</button>
                <button class="btn-model" onclick="switchModel('saturn')">土星</button>
                <button class="btn-model" onclick="switchModel('fireworks')">烟花</button>
            </div>
        </div>

        <div class="form-group">
            <label>粒子光谱设定</label>
            <div class="color-picker-wrapper">
                <input type="color" id="colorPicker" value="#00f0ff">
                <span id="colorHex" style="font-size: 0.9rem; font-family: monospace;">#00F0FF</span>
            </div>
        </div>

        <div class="form-group">
            <label>手势检测态势</label>
            <div class="status-panel">
                <div class="status-row">
                    <span>相机节点:</span>
                    <span style="display: flex; align-items: center;">
                        <span class="status-indicator" id="camera-indicator"></span>
                        <span id="camera-status-text">待挂载</span>
                    </span>
                </div>
                <div class="status-row">
                    <span>手部开合:</span>
                    <span id="gesture-text" style="color: #9ca3af;">检测中...</span>
                </div>
            </div>
        </div>

        <button class="btn-action" id="fullscreenBtn">进入全屏模式</button>
    </div>

    <div id="preview-container">
        <canvas id="pip-canvas" width="160" height="120"></canvas>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <script>
        // --- 核心变量声明 ---
        let scene, camera, renderer, particleGeometry, particleMaterial, particleSystem;
        const maxPoints = 3000;
        
        // 坐标状态数组
        const originPositions = new Float32Array(maxPoints * 3);
        const targetPositions = new Float32Array(maxPoints * 3);
        const currentPositions = new Float32Array(maxPoints * 3);
        
        let morphProgress = 1.0;
        let activeModel = 'heart';
        
        // 实时手势传导参数
        let targetOpenness = 0.5;
        let currentOpenness = 0.5;
        let handDetected = false;

        const videoElement = document.getElementById('webcam');
        const pipCanvas = document.getElementById('pip-canvas');
        const pipCtx = pipCanvas.getContext('2d');

        // --- 1. 初始化 Three.js 环境 ---
        function initThree() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030712, 0.012);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 16);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(scene.fog.color);
            container.appendChild(renderer.domElement);

            const texture = createGlowTexture();

            // 粒子几何载体初始化
            particleGeometry = new THREE.BufferGeometry();
            
            // 设定初始模型结构
            generateHeartShape(originPositions);
            generateHeartShape(targetPositions);
            currentPositions.set(originPositions);

            particleGeometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));

            particleMaterial = new THREE.PointsMaterial({
                color: new THREE.Color(0x00f0ff),
                size: 0.18,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                map: texture
            });

            particleSystem = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particleSystem);

            window.addEventListener('resize', onWindowResize);
        }

        // 动态生成柔和发光材质纹理
        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.25, 'rgba(255,255,255,0.7)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        // --- 2. 几何模型生成算法 (3D Math Models) ---

        // A. 爱心模板
        function generateHeartShape(targetArray) {
            for (let i = 0; i < maxPoints; i++) {
                const idx = i * 3;
                const t = (i / maxPoints) * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                const z = (Math.random() - 0.5) * 8.0;
                
                targetArray[idx] = x * 0.35;
                targetArray[idx + 1] = y * 0.35;
                targetArray[idx + 2] = z * 0.35;
            }
        }

        // B. 花朵模板 (3D 玫瑰曲线)
        function generateFlowerShape(targetArray) {
            for (let i = 0; i < maxPoints; i++) {
                const idx = i * 3;
                const theta = (i / maxPoints) * Math.PI * 2 * 10;
                const petalFactor = 2.0 + 3.0 * Math.abs(Math.sin(3 * theta)); 
                const depth = (Math.random() - 0.5) * 1.5 + (petalFactor * 0.3);

                targetArray[idx] = petalFactor * Math.cos(theta);
                targetArray[idx + 1] = petalFactor * Math.sin(theta);
                targetArray[idx + 2] = depth;
            }
        }

        // C. 太极双鱼模板
        function generateTaijiShape(targetArray) {
            for (let i = 0; i < maxPoints; i++) {
                const idx = i * 3;
                const side = i % 2 === 0 ? 1 : -1;
                const theta = Math.random() * Math.PI * 1.5;
                const r = (theta / (Math.PI * 1.5)) * 4.2;
                
                targetArray[idx] = side * r * Math.cos(theta + (side === 1 ? 0 : Math.PI));
                targetArray[idx + 1] = side * r * Math.sin(theta + (side === 1 ? 0 : Math.PI));
                targetArray[idx + 2] = (Math.random() - 0.5) * 0.8;
            }
        }

        // D. 山水地形模板
        function generateLandscapeShape(targetArray) {
            for (let i = 0; i < maxPoints; i++) {
                const idx = i * 3;
                const x = (Math.random() - 0.5) * 12;
                const z = (Math.random() - 0.5) * 8;
                const dist = Math.sqrt(x * x + z * z);
                const envelope = Math.max(0, 1 - dist / 7.5); 
                
                const height = (Math.sin(x * 1.1) * Math.cos(z * 1.1) * 1.4 + 
                                Math.sin(x * 2.5) * Math.sin(z * 2.2) * 0.5 + 
                                Math.cos(x * 0.4) * 0.8) * envelope;
                
                targetArray[idx] = x;
                targetArray[idx + 1] = height - 1.2;
                targetArray[idx + 2] = z;
            }
        }

        // E. 土星模板
        function generateSaturnShape(targetArray) {
            for (let i = 0; i < maxPoints; i++) {
                const idx = i * 3;
                if (i < 1200) {
                    const u = Math.random();
                    const v = Math.random();
                    const theta = u * 2.0 * Math.PI;
                    const phi = Math.acos(2.0 * v - 1.0);
                    const r = 2.0 + Math.random() * 0.3;
                    targetArray[idx] = r * Math.sin(phi) * Math.cos(theta);
                    targetArray[idx + 1] = r * Math.sin(phi) * Math.sin(theta);
                    targetArray[idx + 2] = r * Math.cos(phi);
                } else {
                    const r = 3.8 + Math.random() * 3.2;
                    const theta = Math.random() * Math.PI * 2;
                    targetArray[idx] = r * Math.cos(theta);
                    targetArray[idx + 1] = (Math.random() - 0.5) * 0.15;
                    targetArray[idx + 2] = r * Math.sin(theta);
                }
            }
        }

        // F. 烟花模板
        function generateFireworksShape(targetArray) {
            const numSpokes = 40;
            const spokes = [];
            for (let s = 0; s < numSpokes; s++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random() * 2 - 1);
                spokes.push(new THREE.Vector3(
                    Math.sin(phi) * Math.cos(theta),
                    Math.sin(phi) * Math.sin(theta),
                    Math.cos(phi)
                ));
            }
            for (let i = 0; i < maxPoints; i++) {
                const idx = i * 3;
                const spoke = spokes[i % numSpokes];
                const dist = 0.5 + Math.random() * 7.5;
                targetArray[idx] = spoke.x * dist;
                targetArray[idx + 1] = spoke.y * dist;
                targetArray[idx + 2] = spoke.z * dist;
            }
        }

        // 切换模型处理函数
        function switchModel(type) {
            if (activeModel === type) return;
            activeModel = type;
            
            document.querySelectorAll('.btn-model').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            for(let i = 0; i < maxPoints * 3; i++) {
                originPositions[i] = currentPositions[i];
            }

            switch(type) {
                case 'heart': generateHeartShape(targetPositions); break;
                case 'flower': generateFlowerShape(targetPositions); break;
                case 'taiji': generateTaijiShape(targetPositions); break;
                case 'landscape': generateLandscapeShape(targetPositions); break;
                case 'saturn': generateSaturnShape(targetPositions); break;
                case 'fireworks': generateFireworksShape(targetPositions); break;
            }
            morphProgress = 0.0;
        }

        // --- 3. 视觉捕捉与归一化手势分析 ---
        function onHandResults(results) {
            pipCtx.clearRect(0, 0, pipCanvas.width, pipCanvas.height);
            pipCtx.drawImage(results.image, 0, 0, pipCanvas.width, pipCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handDetected = true;
                const landmarks = results.multiHandLandmarks[0];

                drawConnectors(pipCtx, landmarks, HAND_CONNECTIONS, { color: '#00f0ff', lineWidth: 1.5 });
                drawLandmarks(pipCtx, landmarks, { color: '#ff007f', lineWidth: 0.5, radius: 1.5 });

                const wrist = landmarks[0];
                const middleMCP = landmarks[9]; 
                const fingerTips = [landmarks[8], landmarks[12], landmarks[16], landmarks[20]]; 

                const referenceScale = getDistance3D(wrist, middleMCP);

                let accumDist = 0;
                fingerTips.forEach(tip => {
                    accumDist += getDistance3D(wrist, tip);
                });
                const avgDistance = accumDist / fingerTips.length;
                const ratio = avgDistance / (referenceScale || 1);

                // 根据生物结构数据，手部开合的典型缩放映射
                let openness = (ratio - 1.25) / 1.15;
                openness = Math.max(0, Math.min(1, openness)); 

                targetOpenness = openness;
                
                document.getElementById('gesture-text').innerText = openness > 0.45 ? 
                    `张开 (${Math.round(openness * 100)}%)` : `闭合 (${Math.round(openness * 100)}%)`;
                document.getElementById('gesture-text').style.color = '#00f0ff';
            } else {
                handDetected = false;
                document.getElementById('gesture-text').innerText = "未捕获手部";
                document.getElementById('gesture-text').style.color = '#9ca3af';
            }
        }

        function getDistance3D(p1, p2) {
            return Math.sqrt(
                Math.pow(p1.x - p2.x, 2) + 
                Math.pow(p1.y - p2.y, 2) + 
                Math.pow(p1.z - p2.z, 2)
            );
        }

        // --- 4. 实时动画渲染循环 ---
        function animate() {
            requestAnimationFrame(animate);

            particleSystem.rotation.y += 0.002;
            particleSystem.rotation.x += 0.0006;

            // 平滑阻尼插值
            if (!handDetected) {
                targetOpenness = 0.5 + Math.sin(Date.now() * 0.0016) * 0.35;
            }
            currentOpenness += (targetOpenness - currentOpenness) * 0.08;

            // 变形动画计算
            if (morphProgress < 1.0) {
                morphProgress += 0.025;
                if (morphProgress > 1.0) morphProgress = 1.0;

                for (let i = 0; i < maxPoints * 3; i++) {
                    originPositions[i] += (targetPositions[i] - originPositions[i]) * 0.15;
                }
            }

            // 更新缓冲区，产生扩散与缩放动画
            const posAttr = particleGeometry.attributes.position;
            for (let i = 0; i < maxPoints; i++) {
                const idx = i * 3;
                const ox = originPositions[idx];
                const oy = originPositions[idx + 1];
                const oz = originPositions[idx + 2];

                const dist = Math.sqrt(ox*ox + oy*oy + oz*oz) || 1;
                const dx = ox / dist;
                const dy = oy / dist;
                const dz = oz / dist;

                // 物理扩散量
                const diffusion = (currentOpenness - 0.5) * 3.5; 

                posAttr.array[idx] = ox + dx * diffusion;
                posAttr.array[idx + 1] = oy + dy * diffusion;
                posAttr.array[idx + 2] = oz + dz * diffusion;
            }
            posAttr.needsUpdate = true;

            // 粒子大小微缩响应
            particleMaterial.size = 0.12 * (0.6 + currentOpenness * 1.2);

            renderer.render(scene, camera);
        }

        // --- 5. 交互控制器绑定 ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        const colorPicker = document.getElementById('colorPicker');
        colorPicker.addEventListener('input', (e) => {
            const hex = e.target.value;
            document.getElementById('colorHex').innerText = hex.toUpperCase();
            particleMaterial.color.set(hex);
        });

        const fullscreenBtn = document.getElementById('fullscreenBtn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    fullscreenBtn.textContent = '退出全屏模式';
                });
            } else {
                document.exitFullscreen().then(() => {
                    fullscreenBtn.textContent = '进入全屏模式';
                });
            }
        });

        document.getElementById('btn-initialize').addEventListener('click', () => {
            document.getElementById('welcome-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-overlay').style.display = 'none';
            }, 400);

            initThree();
            animate();

            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onHandResults);

            const cameraHelper = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 320,
                height: 240
            });

            cameraHelper.start()
                .then(() => {
                    document.getElementById('camera-indicator').classList.add('connected');
                    document.getElementById('camera-status-text').innerText = "已挂载";
                    document.getElementById('camera-status-text').style.color = "#10b981";
                })
                .catch(err => {
                    console.error("摄像头加载异常:", err);
                    document.getElementById('camera-status-text').innerText = "获取失败";
                });
        });
    </script>
</body>
</html>
